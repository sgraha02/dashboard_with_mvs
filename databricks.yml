bundle:
  name: etsy-package-performance

variables:
  warehouse_id:
    description: "SQL warehouse ID used for MV creation and dashboard queries"
  catalog:
    description: "Unity Catalog catalog name (e.g. ivprod)"
  schema:
    description: "Schema name within the catalog (e.g. db_rpt)"

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production

resources:
  dashboards:
    etsy_performance:
      display_name: "Etsy Package Performance"
      file_path: ./etsy_package_performance.lvdash.json
      warehouse_id: ${var.warehouse_id}

  jobs:
    mv_setup:
      name: "etsy-package-performance-mv-setup"
      tasks:
        - task_key: create_etsy_mv
          sql_task:
            file:
              path: ./sql/mv_etsy_base_agg.sql
            warehouse_id: "${var.warehouse_id}"
        - task_key: create_national_mv
          depends_on:
            - task_key: create_etsy_mv
          sql_task:
            file:
              path: ./sql/mv_national_base_agg.sql
            warehouse_id: "${var.warehouse_id}"
