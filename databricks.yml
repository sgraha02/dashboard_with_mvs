bundle:
  name: etsy-package-performance

variables:
  warehouse_id:
    description: "SQL warehouse ID used for MV creation and dashboard queries"
  source_catalog:
    description: "Catalog containing the source raw tables (e.g. ivprod)"
  source_schema:
    description: "Schema containing the source raw tables (e.g. db_rpt)"
  target_catalog:
    description: "Catalog where materialized views will be written"
  target_schema:
    description: "Schema where materialized views will be written"

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production

resources:
  dashboards:
    etsy_performance:
      display_name: "Etsy Package Performance"
      file_path: ./etsy_package_performance.lvdash.json
      warehouse_id: ${var.warehouse_id}

  pipelines:
    mv_pipeline:
      name: "etsy-package-performance-mvs"
      catalog: ${var.target_catalog}
      schema: ${var.target_schema}
      serverless: true
      channel: CURRENT
      continuous: false
      libraries:
        - file:
            path: ./sql/mv_etsy_base_agg.sql
        - file:
            path: ./sql/mv_national_base_agg.sql
